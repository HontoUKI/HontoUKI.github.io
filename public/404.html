<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Rustam — Portfolio</title>
    <!--
      SPA fallback for GitHub Pages (rafgraph/spa-github-pages technique).
      Pages serves this 404.html on unknown paths; we encode the path into a
      query and redirect to the root, where index.html restores the real URL
      and react-router takes over. pathSegmentsToKeep = 0 for a user root site.
    -->
    <script>
      (function () {
        var segments = 0;
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segments).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(segments).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
